name: Deploy to IONOS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: access-5020198099.webspace-host.com
          port: 22
          username: su206610
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: ./
          remote_path: /
          sftp_only: true
          delete_remote_files: false
          args: >
            --exclude=.git
            --exclude=.github
            --exclude=backups
            --exclude=CLAUDE.md
